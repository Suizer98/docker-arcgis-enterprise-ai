  <p>Copy each built widget folder (e.g. <code>dist-prod/widgets/&lt;name&gt;</code>) into this directory. Examples: <code>http://nginx.local:8088/&lt;name&gt;/manifest.json</code> or <code>https://nginx.local:8443/&lt;name&gt;/manifest.json</code> after <code>sh nginx/generate-ssl.sh</code> (add <code>nginx.local</code> to Windows <code>hosts</code>).</p>
