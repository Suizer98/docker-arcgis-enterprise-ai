# Experience Builder custom widgets — static hosting (see Esri doc:
# https://doc.arcgis.com/en/experience-builder/latest/configure-widgets/add-custom-widgets.htm )
#
# HTTP:  copy dist-prod/widgets/<name> under ./nginx/html/
# HTTPS: same; map host ${NGINX_TLS_PORT:-8443}:443. Run: sh nginx/generate-ssl.sh
#
# Portal in Docker often uses http://nginx/<name>/manifest.json (port 80). Do not 301 :80 -> :443
# unless every client (including Portal) uses https://nginx/... and trusts server.crt.

server {
    listen 80;
    server_name localhost;

    include /etc/nginx/snippets/widget-static.conf;
}

server {
    listen 443 ssl http2;
    server_name localhost;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    include /etc/nginx/snippets/widget-static.conf;
}
